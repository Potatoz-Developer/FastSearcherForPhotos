<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FastSearcherForPhotos v1.0</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Nunito', sans-serif;
  background:#F4F1E8;
  padding:20px;
}

.app { max-width:600px; margin:auto; }

h1 { font-family:'Syne'; }

.section { margin:15px 0; }

.chips { display:flex; flex-wrap:wrap; gap:8px; }

.chip {
  padding:8px 14px;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  font-weight:700;
}

.chip.sel { background:#E85D2F; color:white; }

.source-card {
  padding:10px;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  margin:5px 0;
}

.source-card.sel {
  border:2px solid #E85D2F;
  background:#fff5f0;
}

#searchBtn {
  width:100%;
  padding:15px;
  margin-top:10px;
  font-weight:900;
  background:#ccc;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#searchBtn.ready {
  background:#E85D2F;
  color:white;
}

#result {
  margin-top:15px;
  display:none;
  padding:10px;
  background:#fff5f0;
  border-radius:10px;
}

.install-btn {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#3A7BD5;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:800;
}

.footer {
  margin-top:25px;
  text-align:center;
  font-size:11px;
  color:#bbb;
  letter-spacing:1px;
}
</style>
</head>

<body>
<div class="app">

<h1>🔍 FastSearcherForPhotos</h1>
<p>Version 1.0 — Find images & GIFs instantly</p>

<!-- THEME -->
<div class="section">
<b>Theme</b>
<div class="chips" id="temaChips">
<button class="chip" data-val="cat">🐱 Cat</button>
<button class="chip" data-val="dog">🐶 Dog</button>
<button class="chip" data-val="dragon">🐉 Dragon</button>
<button class="chip" data-val="pizza">🍕 Pizza</button>
</div>
</div>

<!-- STYLE -->
<div class="section">
<b>Style</b>
<div class="chips" id="estiloChips">
<button class="chip" data-val="cute">🥹 Cute</button>
<button class="chip" data-val="funny">😂 Funny</button>
<button class="chip" data-val="aesthetic">✨ Aesthetic</button>
<button class="chip" data-val="pixel art">🕹️ Pixel</button>
</div>
</div>

<!-- SOURCE -->
<div class="section">
<b>Source</b>
<div id="fonteCards">
<div class="source-card" data-val="google">Google Images</div>
<div class="source-card" data-val="pinterest">Pinterest</div>
<div class="source-card" data-val="tenor">Tenor GIFs</div>
</div>
</div>

<button id="searchBtn" disabled>🔍 Search now</button>

<div id="result">
<b>Generated search:</b>
<div id="resultQuery"></div>
<a id="openLink" target="_blank">Open 🔗</a>
</div>

<button class="install-btn" id="installBtn">
⚡ Get even faster with a shortcut!
</button>

<!-- VERSION FOOTER -->
<div class="footer">
  FastSearcherForPhotos — v1.0
</div>

</div>

<script>
const state = { tema:null, estilo:null, fonte:null };

function setupChips(id, key) {
  document.getElementById(id).onclick = e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;

    document.querySelectorAll('#'+id+' .chip').forEach(c=>c.classList.remove('sel'));
    chip.classList.add('sel');

    state[key] = chip.dataset.val;
    updateBtn();
  }
}

setupChips('temaChips','tema');
setupChips('estiloChips','estilo');

document.getElementById('fonteCards').onclick = e => {
  const card = e.target.closest('.source-card');
  if (!card) return;

  document.querySelectorAll('.source-card').forEach(c=>c.classList.remove('sel'));
  card.classList.add('sel');

  state.fonte = card.dataset.val;
  updateBtn();
}

const btn = document.getElementById('searchBtn');

function updateBtn() {
  const ready = state.tema && state.estilo && state.fonte;
  btn.disabled = !ready;
  btn.classList.toggle('ready', ready);
}

btn.onclick = () => {
  const query = `${state.tema} ${state.estilo}`;

  let url = "";

  if (state.fonte === "google") {
    url = `https://www.google.com/search?q=${encodeURIComponent(query)}&tbm=isch`;
  }

  if (state.fonte === "pinterest") {
    url = `https://www.pinterest.com/search/pins/?q=${encodeURIComponent(query)}`;
  }

  if (state.fonte === "tenor") {
    url = `https://tenor.com/search/${encodeURIComponent(query)}-gifs`;
  }

  document.getElementById('result').style.display = "block";
  document.getElementById('resultQuery').innerText = query;

  const link = document.getElementById('openLink');
  link.href = url;
  link.innerText = `Open in ${state.fonte}`;
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

document.getElementById('installBtn').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  } else {
    alert("Use your browser menu → 'Add to Home Screen'");
  }
};
</script>

</body>
</html>
